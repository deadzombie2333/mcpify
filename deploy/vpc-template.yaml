AWSTemplateFormatVersion: '2010-09-09'
Description: 'mcpify — VPC with VPC Endpoints for AWS Services'

Parameters:
  VpcName:
    Type: String
    Description: Name prefix for VPC resources
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
  AvailabilityZone1:
    Type: AWS::EC2::AvailabilityZone::Name
  AvailabilityZone2:
    Type: AWS::EC2::AvailabilityZone::Name

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags: [{Key: Name, Value: !Sub '${VpcName}-vpc'}]

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags: [{Key: Name, Value: !Sub '${VpcName}-igw'}]

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties: {VpcId: !Ref VPC, InternetGatewayId: !Ref InternetGateway}

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.11.0/24
      AvailabilityZone: !Ref AvailabilityZone1
      MapPublicIpOnLaunch: true
      Tags: [{Key: Name, Value: !Sub '${VpcName}-public-1'}]

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.12.0/24
      AvailabilityZone: !Ref AvailabilityZone2
      MapPublicIpOnLaunch: true
      Tags: [{Key: Name, Value: !Sub '${VpcName}-public-2'}]

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.21.0/24
      AvailabilityZone: !Ref AvailabilityZone1
      Tags: [{Key: Name, Value: !Sub '${VpcName}-private-1'}]

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.22.0/24
      AvailabilityZone: !Ref AvailabilityZone2
      Tags: [{Key: Name, Value: !Sub '${VpcName}-private-2'}]

  NatEIP1:
    Type: AWS::EC2::EIP
    DependsOn: AttachGateway
    Properties: {Domain: vpc}
  NatEIP2:
    Type: AWS::EC2::EIP
    DependsOn: AttachGateway
    Properties: {Domain: vpc}

  NatGateway1:
    Type: AWS::EC2::NatGateway
    Properties: {AllocationId: !GetAtt NatEIP1.AllocationId, SubnetId: !Ref PublicSubnet1}
  NatGateway2:
    Type: AWS::EC2::NatGateway
    Properties: {AllocationId: !GetAtt NatEIP2.AllocationId, SubnetId: !Ref PublicSubnet2}

  PublicRT:
    Type: AWS::EC2::RouteTable
    Properties: {VpcId: !Ref VPC, Tags: [{Key: Name, Value: !Sub '${VpcName}-public-rt'}]}
  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties: {RouteTableId: !Ref PublicRT, DestinationCidrBlock: 0.0.0.0/0, GatewayId: !Ref InternetGateway}
  PubSub1RTA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: {RouteTableId: !Ref PublicRT, SubnetId: !Ref PublicSubnet1}
  PubSub2RTA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: {RouteTableId: !Ref PublicRT, SubnetId: !Ref PublicSubnet2}

  PrivateRT1:
    Type: AWS::EC2::RouteTable
    Properties: {VpcId: !Ref VPC, Tags: [{Key: Name, Value: !Sub '${VpcName}-private-rt-1'}]}
  PrivateRoute1:
    Type: AWS::EC2::Route
    Properties: {RouteTableId: !Ref PrivateRT1, DestinationCidrBlock: 0.0.0.0/0, NatGatewayId: !Ref NatGateway1}
  PriSub1RTA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: {RouteTableId: !Ref PrivateRT1, SubnetId: !Ref PrivateSubnet1}

  PrivateRT2:
    Type: AWS::EC2::RouteTable
    Properties: {VpcId: !Ref VPC, Tags: [{Key: Name, Value: !Sub '${VpcName}-private-rt-2'}]}
  PrivateRoute2:
    Type: AWS::EC2::Route
    Properties: {RouteTableId: !Ref PrivateRT2, DestinationCidrBlock: 0.0.0.0/0, NatGatewayId: !Ref NatGateway2}
  PriSub2RTA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: {RouteTableId: !Ref PrivateRT2, SubnetId: !Ref PrivateSubnet2}

  SG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${VpcName}-sg'
      GroupDescription: VPC endpoint security group
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - {IpProtocol: tcp, FromPort: 443, ToPort: 443, CidrIp: !Ref VpcCidr}
  SGSelfRef:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref SG
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      SourceSecurityGroupId: !Ref SG

  # VPC Endpoints
  S3GW:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.s3'
      VpcEndpointType: Gateway
      RouteTableIds: [!Ref PrivateRT1, !Ref PrivateRT2]

  LogsEP:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.logs'
      VpcEndpointType: Interface
      SubnetIds: [!Ref PrivateSubnet1, !Ref PrivateSubnet2]
      SecurityGroupIds: [!Ref SG]
      PrivateDnsEnabled: true

  BedrockEP:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.bedrock'
      VpcEndpointType: Interface
      SubnetIds: [!Ref PrivateSubnet1, !Ref PrivateSubnet2]
      SecurityGroupIds: [!Ref SG]
      PrivateDnsEnabled: true

  BedrockRuntimeEP:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.bedrock-runtime'
      VpcEndpointType: Interface
      SubnetIds: [!Ref PrivateSubnet1, !Ref PrivateSubnet2]
      SecurityGroupIds: [!Ref SG]
      PrivateDnsEnabled: true

  BedrockAgentCoreEP:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.bedrock-agentcore'
      VpcEndpointType: Interface
      SubnetIds: [!Ref PrivateSubnet1, !Ref PrivateSubnet2]
      SecurityGroupIds: [!Ref SG]
      PrivateDnsEnabled: true

  BedrockAgentCoreGWEP:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.bedrock-agentcore.gateway'
      VpcEndpointType: Interface
      SubnetIds: [!Ref PrivateSubnet1, !Ref PrivateSubnet2]
      SecurityGroupIds: [!Ref SG]
      PrivateDnsEnabled: true

  LambdaEP:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.lambda'
      VpcEndpointType: Interface
      SubnetIds: [!Ref PrivateSubnet1, !Ref PrivateSubnet2]
      SecurityGroupIds: [!Ref SG]
      PrivateDnsEnabled: true

  CognitoEP:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.cognito-idp'
      VpcEndpointType: Interface
      SubnetIds: [!Ref PrivateSubnet1, !Ref PrivateSubnet2]
      SecurityGroupIds: [!Ref SG]
      PrivateDnsEnabled: true

  DynamoDBEP:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.dynamodb'
      VpcEndpointType: Gateway
      RouteTableIds: [!Ref PrivateRT1, !Ref PrivateRT2]

  AOSSEP:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.aoss'
      VpcEndpointType: Interface
      SubnetIds: [!Ref PrivateSubnet1, !Ref PrivateSubnet2]
      SecurityGroupIds: [!Ref SG]
      PrivateDnsEnabled: true

Outputs:
  VPCId:
    Value: !Ref VPC
    Export: {Name: !Sub '${VpcName}-VPC-ID'}
  PrivateSubnet1Id:
    Value: !Ref PrivateSubnet1
    Export: {Name: !Sub '${VpcName}-PrivateSubnet1-ID'}
  PrivateSubnet2Id:
    Value: !Ref PrivateSubnet2
    Export: {Name: !Sub '${VpcName}-PrivateSubnet2-ID'}
  SecurityGroupId:
    Value: !Ref SG
    Export: {Name: !Sub '${VpcName}-SecurityGroup-ID'}
  OpenSearchServerlessEPId:
    Value: !Ref AOSSEP
    Export: {Name: !Sub '${VpcName}-OpenSearchServerless-ID'}
